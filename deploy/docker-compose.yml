services:
  mysql:
    image: mysql:8.0
    container_name: klein-mysql
    restart: always
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=2G
      - --max_connections=300
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: ${KLEIN_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${KLEIN_MYSQL_DB:-klein_ai}
      MYSQL_USER: ${KLEIN_MYSQL_USER:-klein}
      MYSQL_PASSWORD: ${KLEIN_MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${KLEIN_MYSQL_PORT:-13306}:3306"
    volumes:
      - klein-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      retries: 6
    networks: [klein]

  redis:
    image: redis:7-alpine
    container_name: klein-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${KLEIN_REDIS_PORT:-16379}:6379"
    volumes:
      - klein-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 6
    networks: [klein]

  migrate:
    image: ${KLEIN_BACKEND_IMAGE:?set KLEIN_BACKEND_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-migrate
    restart: "no"
    entrypoint: ["/app/goose"]
    command:
      - -dir
      - /app/migrations
      - mysql
      - ${KLEIN_DB_DSN}
      - up
    depends_on:
      mysql: { condition: service_healthy }
    networks: [klein]

  api:
    image: ${KLEIN_BACKEND_IMAGE:?set KLEIN_BACKEND_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-api
    restart: always
    command: ["/app/api"]
    environment: &common-env
      KLEIN_ENV: ${KLEIN_ENV:-prod}
      KLEIN_DB_DSN: ${KLEIN_DB_DSN}
      KLEIN_REDIS_ADDR: ${KLEIN_REDIS_ADDR:-redis:6379}
      KLEIN_REDIS_PASSWORD: ${KLEIN_REDIS_PASSWORD:-}
      KLEIN_JWT_SECRET: ${KLEIN_JWT_SECRET}
      KLEIN_JWT_REFRESH_SECRET: ${KLEIN_JWT_REFRESH_SECRET}
      KLEIN_AES_KEY: ${KLEIN_AES_KEY}
      KLEIN_OPENAI_BASE: ${KLEIN_OPENAI_BASE:-https://api.openai.com}
      KLEIN_GROK_BASE: ${KLEIN_GROK_BASE:-https://api.x.ai}
      KLEIN_PROVIDER_GPT: ${KLEIN_PROVIDER_GPT:-mock}
      KLEIN_PROVIDER_GROK: ${KLEIN_PROVIDER_GROK:-mock}
      KLEIN_GROK_BASE_URL: ${KLEIN_GROK_BASE_URL:-https://grok.com}
      KLEIN_GROK_CF_STATE_PATH: /app/storage/grok_cf.json
      KLEIN_CORS_ORIGINS: ${KLEIN_CORS_ORIGINS}
      KLEIN_LOG_DIR: /app/logs
      TZ: Asia/Shanghai
      KLEIN_NODE_ID: 1
    expose: ["17180"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/api", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [klein]

  admin:
    image: ${KLEIN_BACKEND_IMAGE:?set KLEIN_BACKEND_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-admin
    restart: always
    command: ["/app/admin"]
    environment:
      <<: *common-env
      KLEIN_NODE_ID: 2
    expose: ["17188"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  openai:
    image: ${KLEIN_BACKEND_IMAGE:?set KLEIN_BACKEND_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-openai
    restart: always
    command: ["/app/openai"]
    environment:
      <<: *common-env
      KLEIN_NODE_ID: 3
    expose: ["17200"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  worker:
    image: ${KLEIN_BACKEND_IMAGE:?set KLEIN_BACKEND_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-worker
    restart: always
    command: ["/app/worker"]
    environment:
      <<: *common-env
      KLEIN_NODE_ID: 4
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  user-web:
    image: ${KLEIN_USER_WEB_IMAGE:?set KLEIN_USER_WEB_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-user-web
    restart: always
    expose: ["80"]
    volumes:
      - ./nginx-dev/user-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api, openai]
    networks: [klein]

  admin-web:
    image: ${KLEIN_ADMIN_WEB_IMAGE:?set KLEIN_ADMIN_WEB_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-admin-web
    restart: always
    expose: ["80"]
    volumes:
      - ./nginx-dev/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [admin]
    networks: [klein]

  nginx:
    image: nginx:1.27-alpine
    container_name: klein-nginx
    restart: always
    depends_on: [api, admin, openai, user-web, admin-web]
    ports:
      - "${KLEIN_USER_WEB_PORT:-17080}:17080"
      - "${KLEIN_ADMIN_WEB_PORT:-17088}:17088"
      - "${KLEIN_OPENAI_PORT:-17200}:17200"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - klein-logs:/var/log/nginx
    networks: [klein]

volumes:
  klein-mysql-data:
  klein-redis-data:
  klein-logs:
  klein-storage:

networks:
  klein:
    name: klein-net

