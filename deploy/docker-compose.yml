services:
  mysql:
    image: mysql:8.0
    container_name: klein-mysql
    restart: always
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: ${KLEIN_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${KLEIN_MYSQL_DB:-klein_ai}
      MYSQL_USER: ${KLEIN_MYSQL_USER:-klein}
      MYSQL_PASSWORD: ${KLEIN_MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${KLEIN_MYSQL_PORT:-13306}:3306"
    volumes:
      - klein-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [klein]

  redis:
    image: redis:7-alpine
    container_name: klein-redis
    restart: always
    command:
      - sh
      - -c
      - |
        if [ -n "$$KLEIN_REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$KLEIN_REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    environment:
      KLEIN_REDIS_PASSWORD: ${KLEIN_REDIS_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${KLEIN_REDIS_PORT:-16379}:6379"
    volumes:
      - klein-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$KLEIN_REDIS_PASSWORD\" ]; then redis-cli --no-auth-warning -a \"$$KLEIN_REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [klein]

  migrate:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-migrate
    restart: "no"
    command:
      - goose
      - -dir
      - /app/migrations
      - mysql
      - "${KLEIN_DB_DSN:?set KLEIN_DB_DSN in deploy/.env}"
      - up
    depends_on:
      mysql: { condition: service_healthy }
    networks: [klein]

  api:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-api
    restart: always
    command: ["api"]
    environment: &backend-env
      KLEIN_ENV: ${KLEIN_ENV:-prod}
      KLEIN_DB_DSN: ${KLEIN_DB_DSN}
      KLEIN_REDIS_ADDR: ${KLEIN_REDIS_ADDR:-redis:6379}
      KLEIN_REDIS_PASSWORD: ${KLEIN_REDIS_PASSWORD:-}
      KLEIN_JWT_SECRET: ${KLEIN_JWT_SECRET}
      KLEIN_JWT_REFRESH_SECRET: ${KLEIN_JWT_REFRESH_SECRET}
      KLEIN_AES_KEY: ${KLEIN_AES_KEY}
      KLEIN_PROVIDER_GPT: ${KLEIN_PROVIDER_GPT:-mock}
      KLEIN_PROVIDER_GROK: ${KLEIN_PROVIDER_GROK:-mock}
      KLEIN_GPT_BASE_URL: ${KLEIN_GPT_BASE_URL:-https://chatgpt.com}
      KLEIN_GROK_BASE_URL: ${KLEIN_GROK_BASE_URL:-https://grok.com}
      KLEIN_CORS_ORIGINS: ${KLEIN_CORS_ORIGINS}
      KLEIN_LOG_DIR: /app/logs
      KLEIN_STORAGE_ROOT: /app/storage/public
      KLEIN_GROK_CF_STATE_PATH: /app/storage/grok_cf.json
      KLEIN_NODE_ID: 1
      TZ: Asia/Shanghai
    expose: ["17180"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  admin:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-admin
    restart: always
    command: ["admin"]
    environment:
      <<: *backend-env
      KLEIN_NODE_ID: 2
    expose: ["17188"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  openai:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-openai
    restart: always
    command: ["openai"]
    environment:
      <<: *backend-env
      KLEIN_NODE_ID: 3
    expose: ["17200"]
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  worker:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-worker
    restart: always
    command: ["worker"]
    environment:
      <<: *backend-env
      KLEIN_NODE_ID: 4
    volumes:
      - klein-logs:/app/logs
      - klein-storage:/app/storage
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [klein]

  user-web:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-user-web
    restart: always
    command: ["user-web"]
    expose: ["80"]
    depends_on: [api, openai]
    networks: [klein]

  admin-web:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-admin-web
    restart: always
    command: ["admin-web"]
    expose: ["80"]
    depends_on: [admin]
    networks: [klein]

  nginx:
    image: ${KLEIN_IMAGE:?set KLEIN_IMAGE in deploy/.env}
    pull_policy: always
    container_name: klein-nginx
    restart: always
    command: ["nginx", "-g", "daemon off;"]
    depends_on: [api, admin, openai, user-web, admin-web]
    ports:
      - "${KLEIN_USER_WEB_PORT:-17080}:17080"
      - "${KLEIN_ADMIN_WEB_PORT:-17088}:17088"
      - "${KLEIN_OPENAI_PORT:-17200}:17200"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    networks: [klein]

volumes:
  klein-mysql-data:
  klein-redis-data:
  klein-logs:
  klein-storage:

networks:
  klein:
    name: klein-net
