name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - upstream.lock.json
      - deploy/**
      - scripts/**
      - .github/workflows/docker-publish.yml

env:
  GHCR_IMAGE: ghcr.io/alice-qwq77/gpt2api

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build metadata
        id: vars
        shell: pwsh
        run: ./scripts/resolve-build-metadata.ps1 -Image $env:GHCR_IMAGE -WriteGitHubOutput

      - name: Add git metadata
        id: gitvars
        shell: pwsh
        run: |
          "git_short=$($env:GITHUB_SHA.Substring(0, 7))" | Add-Content $env:GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:upstream-${{ steps.vars.outputs.upstream_short }}
            ${{ steps.vars.outputs.image }}:git-${{ steps.gitvars.outputs.git_short }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Automated Docker build for 432539/gpt2api
            com.github.upstream.repo=${{ steps.vars.outputs.repo_url }}
            com.github.upstream.commit=${{ steps.vars.outputs.upstream_commit }}
          build-args: |
            GO_VERSION=${{ steps.vars.outputs.go_version }}
            UPSTREAM_REPO=${{ steps.vars.outputs.repo_url }}.git
            UPSTREAM_REF=${{ steps.vars.outputs.upstream_commit }}
            UPSTREAM_REF_SHORT=${{ steps.vars.outputs.upstream_short }}
            UPSTREAM_ARCHIVE_URL=${{ steps.vars.outputs.archive_url }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
